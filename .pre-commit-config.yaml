repos:
 - repo: https://github.com/astral-sh/ruff-pre-commit
   rev: v0.11.2
   hooks:
    # Run the linter with auto-fix on commit
    - id: ruff
      args:
       - "--fix"
      stages: [pre-commit]
    # Run the formatter on commit
    - id: ruff-format
      stages: [pre-commit]

 - repo: https://github.com/pre-commit/pre-commit-hooks
   rev: v5.0.0
   hooks:
    - id: trailing-whitespace
      stages: [pre-commit]
    - id: end-of-file-fixer
      stages: [pre-commit]
    - id: check-yaml
      stages: [pre-commit]
    - id: check-toml
      stages: [pre-commit]
    - id: check-ast
      stages: [pre-commit]
    - id: mixed-line-ending
      args: [--fix=lf]
      stages: [pre-commit]

 - repo: local
   hooks:
    # Prevent direct pushes to main branch (bypass with --no-verify for releases)
    - id: no-push-to-main
      name: Prevent direct push to main branch
      entry: bash -c 'branch=$(git rev-parse --abbrev-ref HEAD); if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then echo "Direct pushes to $branch are not allowed. Use --no-verify to bypass."; exit 1; fi'
      language: system
      pass_filenames: false
      stages: [pre-push]
    # Run ruff check without fixes on push (to catch any issues)
    - id: ruff-check-push
      name: Ruff check (no fixes)
      entry: ruff check
      language: system
      types: [python]
      pass_filenames: false
      stages: [pre-push]
    # Run full test suite on push
    - id: pytest-push
      name: Run pytest
      entry: pytest
      language: system
      pass_filenames: false
      always_run: true
      stages: [pre-push]

 - repo: https://github.com/compilerla/conventional-pre-commit
   rev: v3.4.0
   hooks:
    - id: conventional-pre-commit
      stages: [commit-msg]

 - repo: https://github.com/fpgmaas/deptry.git
   rev: "0.24.0"
   hooks:
    - id: deptry

 - repo: https://github.com/lycheeverse/lychee
   rev: lychee-v0.22.0
   hooks:
    - id: lychee
      args: ["--no-progress", "--timeout", "10", "--cache", "--max-cache-age", "1d", "."]
      stages: [pre-push]
